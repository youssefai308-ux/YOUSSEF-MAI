<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Our Secret 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Arial';
  background: linear-gradient(135deg, #ffd6e0, #ffeef2);
  text-align: center;
  overflow-x: hidden;
}

.container {
  padding: 40px;
}

h1 {
  color: #ff4d6d;
}

p {
  color: #444;
  font-size: 18px;
}

input {
  padding: 12px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff3355;
}

.hidden {
  display: none;
}

.gallery img {
  width: 180px;
  border-radius: 20px;
  margin: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-800px); opacity: 0; }
}

.fade {
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>

</head>

<body>

<div class="container" id="login">
  <h2>Enter Our Secret Password 💕</h2>
  <input type="password" id="pass" placeholder="Secret here...">
  <br><br>
  <button onclick="check()">Enter 💖</button>
</div>

<div class="container hidden fade" id="content">
  <h1>Hey My Favorite Person 💘</h1>

  <p>
    اكتبي هنا رسالتك ✨  
    (مثال: وجودك في حياتي أحلى صدفة حصلتلي 💖)
  </p>

  <div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
  </div>

  <br>

  <audio controls autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
function check(){
  var password = document.getElementById("pass").value;

  if(password === "1234"){ // غير الباسورد هنا
    document.getElementById("login").style.display = "none";
    document.getElementById("content").classList.remove("hidden");
    startHearts();
  } else {
    alert("Wrong password 😢");
  }
}

// قلوب بتطلع لفوق
function startHearts(){
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }, 300);
}
</script>

</body>
</html>
