<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 For Mai 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1f1f1f);
  color: white;
  text-align: center;
}

.container {
  padding: 40px;
}

h1 {
  color: #ff4d6d;
}

p {
  font-size: 20px;
  color: #ddd;
}

input {
  padding: 12px;
  border-radius: 20px;
  border: none;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  margin: 10px;
  transition: 0.3s;
}

button:hover {
  background: #ff3355;
}

.hidden {
  display: none;
}

.gallery img {
  width: 200px;
  border-radius: 20px;
  margin: 10px;
}

#gift {
  margin-top: 20px;
  font-size: 22px;
  color: #ff9bb3;
  display: none;
}

.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-800px); opacity: 0; }
}
</style>

</head>

<body>

<div class="container" id="login">
  <h2>Enter Password 💕</h2>
  <input type="password" id="pass" placeholder="Password">
  <br><br>
  <button onclick="check()">Enter 💖</button>
</div>

<div class="container hidden" id="content">
  <h1>To My Love Mai 💘</h1>

  <p>
    انتي نور عيني يا مي من حبيبك يوسف 💖
  </p>

  <div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
  </div>

  <br>

  <audio controls autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <br>

  <button onclick="showGift()">🎁 ادخل خد هديتك</button>

  <div id="gift">
    بحبك يا مي 💕
  </div>

</div>

<script>
function check(){
  var password = document.getElementById("pass").value;

  if(password === "308"){
    document.getElementById("login").style.display = "none";
    document.getElementById("content").classList.remove("hidden");
    startHearts();
  } else {
    alert("Wrong password 😢");
  }
}

function showGift(){
  document.getElementById("gift").style.display = "block";
}

function startHearts(){
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }, 300);
}
</script>

</body>
</html>
