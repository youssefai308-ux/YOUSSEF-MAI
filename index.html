<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 For Mai 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1f1f1f);
  color: white;
  text-align: center;
}

.container {
  padding: 40px;
}

h1 {
  color: #ff4d6d;
}

p {
  font-size: 20px;
  color: #ddd;
}

input {
  padding: 12px;
  border-radius: 20px;
  border: none;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  margin: 10px;
}

.hidden {
  display: none;
}

.slider img {
  width: 250px;
  border-radius: 20px;
  display: none;
  margin: auto;
}

.slide.active {
  display: block;
}

#gift {
  margin-top: 20px;
  font-size: 22px;
  color: #ff9bb3;
  display: none;
}

.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-800px); opacity: 0; }
}
</style>

</head>

<body>

<div class="container" id="login">
  <h2>Enter Password 💕</h2>
  <input type="password" id="pass" placeholder="Password">
  <br><br>
  <button onclick="check()">Enter 💖</button>
</div>

<div class="container hidden" id="content">
  <h1>To My Love Mai 💘</h1>

  <p>
    انتي نور عيني يا مي من حبيبك يوسف 💖
  </p>

  <!-- سلايدر الصور -->
  <div class="slider">
    <img class="slide active" src="Snapchat-1592571296.jpg">
    <img class="slide" src="IMG_20260416_165306_893.jpg">
    <img class="slide" src="IMG_20260113_162916_851.jpg">

    <br>
    <button onclick="prevSlide()">⬅️</button>
    <button onclick="nextSlide()">➡️</button>
  </div>

  <br>

  <!-- الأغنية -->
  <audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <br>

  <!-- زرار الهدية -->
  <button onclick="showGift()">🎁 ادخل خد هديتك</button>

  <div id="gift">
    بحبك يا مي 💕
  </div>

</div>

<script>
function check(){
  var password = document.getElementById("pass").value;

  if(password === "308"){
    document.getElementById("login").style.display = "none";
    document.getElementById("content").classList.remove("hidden");

    // تشغيل الأغنية
    var music = document.getElementById("music");
    music.play();

    startHearts();
  } else {
    alert("Wrong password 😢");
  }
}

// زرار الهدية
function showGift(){
  document.getElementById("gift").style.display = "block";
}

// سلايدر الصور
let current = 0;
let slides = document.getElementsByClassName("slide");

function showSlide(index){
  for(let i = 0; i < slides.length; i++){
    slides[i].classList.remove("active");
  }
  slides[index].classList.add("active");
}

function nextSlide(){
  current = (current + 1) % slides.length;
  showSlide(current);
}

function prevSlide(){
  current = (current - 1 + slides.length) % slides.length;
  showSlide(current);
}

setInterval(nextSlide, 3000);

// قلوب طايرة
function startHearts(){
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }, 300);
}
</script>

</body>
</html>
